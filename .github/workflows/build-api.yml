name: Build and Publish API

on:
  # Trigger on PR merge (Develop/Master)
  pull_request:
    types: [closed]
    branches: [ "master", "develop" ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/build-api.yml'
  
  # Trigger on Manual Run
  workflow_dispatch:

  # Trigger on SemVer Tags (v1.0.0, v2.1.0-rc1)
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  # ============================================
  # Job 1: Run Tests
  # ============================================
  test:
    # Run if PR merged OR Manual OR Tag Push
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore src/Acme.slnx

      - name: Build solution
        run: dotnet build src/Acme.slnx --configuration Release --no-restore

      # - name: Run tests
      #   run: dotnet test src/Acme.slnx --configuration Release --no-build --verbosity normal

  # ============================================
  # Job 2: Build & Push Docker Image
  # ============================================
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch-based tags (develop -> develop)
            type=ref,event=branch
            
            # SemVer tags (v1.0.0 -> 1.0.0, 1.0, latest)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            
            # SHA tag for traceability
            type=sha,format=short
            
            # Latest tag logic
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Acme.Host/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 3: Deploy to VPS (Multi-Environment)
  # ============================================
  deploy-to-vps:
    if: (github.event.pull_request.base.ref == 'develop' || github.event.pull_request.base.ref == 'master') && github.event.pull_request.merged == true
    needs: build-and-push
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - branch: develop
            environment: development
          - branch: master
            environment: production
    environment:
      name: ${{ matrix.environment }}
      url: https://${{ secrets.VPS_DOMAIN }}
    
    steps:
      - name: Deploy to ${{ matrix.environment }} VPS via SSH
        if: github.event.pull_request.base.ref == matrix.branch
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_PATH || '/opt/acme' }}
            
            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images (force download)
            docker compose -f docker-compose.production.yml pull
            
            # Restart services with new images
            docker compose -f docker-compose.production.yml up -d
            
            # Logout from registry
            docker logout ghcr.io
            
            # Wait for services to be healthy
            echo "Waiting for services to start..."
            sleep 10
            
            # Check API health
            CONTAINER_NAME="${{ secrets.CONTAINER_NAME || 'acme-api-prod' }}"
            for i in {1..30}; do
              if docker exec $CONTAINER_NAME curl -f http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ ${{ matrix.environment }} API is healthy!"
                break
              fi
              echo "Waiting for API... ($i/30)"
              sleep 2
            done
            
            # Show running containers
            docker compose -f docker-compose.production.yml ps
            
            echo "🚀 ${{ matrix.environment }} deployment completed successfully!"

