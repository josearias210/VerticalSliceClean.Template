name: Build and Publish API

on:
  # Trigger on PR merge (Develop/Main)
  pull_request:
    types: [closed]
    branches: [ "main", "develop" ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/build-api.yml'
  
  # Trigger on Manual Run
  workflow_dispatch:
    inputs:
      environment:
        description: 'Target Environment'
        required: true
        default: 'development'
        type: choice
        options:
        - development
        - production

  # Trigger on SemVer Tags (v1.0.0, v2.1.0-rc1)
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

# Concurrency Control: Prevent simultaneous deployments to same environment
concurrency:
  group: deploy-${{ github.event.pull_request.base.ref || github.event.inputs.environment || github.ref }}
  cancel-in-progress: false

jobs:
  # ============================================
  # Job 1: Build & Push
  # ============================================
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Timeout optimization
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch-based tags (develop -> develop)
            type=ref,event=branch
            type=ref,event=pr
            
            # SemVer tags (v1.0.0 -> 1.0.0, 1.0, latest)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            
            # SHA tag for traceability
            type=sha
            
            # Latest tag logic
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Dynamic Environment Variables Optimization
      - name: Set build metadata
        run: |
          echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Acme.Host/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Job 2: Release to VPS
  # ============================================
  release:
    name: Release ${{ matrix.environment || inputs.environment }}
    if: (github.event.pull_request.merged == true) || (github.event_name == 'workflow_dispatch' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop'))
    needs: build
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Timeout optimization
    strategy:
      matrix:
        include:
          - branch: develop
            environment: development
          - branch: main
            environment: production
    environment:
      name: ${{ matrix.environment || inputs.environment }}
      url: https://${{ secrets.VPS_DOMAIN }}
    
    steps:
      - name: Deploy to ${{ matrix.environment || inputs.environment }} VPS via SSH
        if: (github.event_name == 'pull_request' && github.event.pull_request.base.ref == matrix.branch) || (github.event_name == 'workflow_dispatch' && matrix.environment == inputs.environment)
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd ${{ secrets.VPS_PATH || '/opt/acme' }}
            
            # Login to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin
            
            # Pull latest images (force download)
            docker compose -f docker-compose.production.yml pull
            
            # Restart services with new images
            docker compose -f docker-compose.production.yml up -d
            
            # Logout from registry
            docker logout ghcr.io
            
            # Image Cleanup Optimization
            echo "Cleaning up old images..."
            docker image prune -af --filter "until=168h" || true
            
            # Wait for services to be healthy
            echo "Waiting for services to start..."
            sleep 10
            
            # Check API health
            CONTAINER_NAME="${{ secrets.CONTAINER_NAME || 'acme-api-prod' }}"
            for i in {1..30}; do
              if docker exec $CONTAINER_NAME curl -f http://localhost:8080/health > /dev/null 2>&1; then
                echo "✅ ${{ matrix.environment }} API is healthy!"
                break
              fi
              echo "Waiting for API... ($i/30)"
              sleep 2
            done
            
            # Show running containers
            docker compose -f docker-compose.production.yml ps
            
            echo "🚀 ${{ matrix.environment }} deployment completed successfully!"
