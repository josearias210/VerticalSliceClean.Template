name: Build API

on:
  # Trigger on Pull Requests (Develop/Main)
  pull_request:
    types: [opened, synchronize, reopened, closed]
    branches: [ "main", "develop" ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/build-api.yml'
  
  # Trigger on Manual Run
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

# Concurrency control
concurrency:
  group: build-${{ github.event.pull_request.base.ref || github.ref }}
  cancel-in-progress: false

jobs:
  build:
    name: Build
    runs-on: ubuntu-latest
    timeout-minutes: 20  # Timeout optimization
    permissions:
      contents: read
      packages: write
    
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore dependencies
        run: dotnet restore src/Acme.slnx

      - name: Build solution
        run: dotnet build src/Acme.slnx --configuration Release --no-restore

      - name: Run application unit tests
        run: dotnet test tests/Acme.Application.Unit.Tests/Acme.Application.Unit.Tests.csproj --configuration Release --no-build --no-restore

      - name: Log in to the Container registry
        if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Extract metadata (tags, labels) for Docker
        if: github.event_name != 'pull_request' || github.event.pull_request.merged == true
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch-based tags (develop -> develop)
            type=ref,event=branch
            type=ref,event=pr
            
            # SHA tag for traceability
            type=sha
            
            # Latest tag logic
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # Dynamic Environment Variables Optimization
      - name: Set build metadata
        run: |
          echo "VERSION=${{ github.sha }}" >> $GITHUB_ENV
          echo "BUILD_DATE=$(date -u +'%Y-%m-%dT%H:%M:%SZ')" >> $GITHUB_ENV

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Acme.Host/Dockerfile
          push: ${{ github.event_name != 'pull_request' || github.event.pull_request.merged == true }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ env.VERSION }}
            BUILD_DATE=${{ env.BUILD_DATE }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
