name: Build and Publish API

on:
  # Trigger on PR merge (Develop/Master)
  pull_request:
    types: [closed]
    branches: [ "master", "develop" ]
    paths:
      - 'src/**'
      - 'Dockerfile'
      - '.github/workflows/build-api.yml'
  
  # Trigger on Manual Run
  workflow_dispatch:

  # Trigger on SemVer Tags (v1.0.0, v2.1.0-rc1)
  push:
    tags:
      - 'v*'

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}-api

jobs:
  # ============================================
  # Job 1: Run Tests
  # ============================================
  test:
    # Run if PR merged OR Manual OR Tag Push
    if: github.event.pull_request.merged == true || github.event_name == 'workflow_dispatch' || github.event_name == 'push'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore src/Acme.slnx

      - name: Build solution
        run: dotnet build src/Acme.slnx --configuration Release --no-restore

      # - name: Run tests
      #   run: dotnet test src/Acme.slnx --configuration Release --no-build --verbosity normal

  # ============================================
  # Job 2: Build & Push Docker Image
  # ============================================
  build-and-push:
    needs: test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            # Branch-based tags (develop -> develop)
            type=ref,event=branch
            
            # SemVer tags (v1.0.0 -> 1.0.0, 1.0, latest)
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            
            # SHA tag for traceability
            type=sha,format=short
            
            # Latest tag logic
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/master' }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: src/Acme.Host/Dockerfile
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
