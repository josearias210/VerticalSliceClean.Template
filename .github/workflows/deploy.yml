name: Build and Deploy

on:
  push:
    branches: [ main, master ]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [ main, master ]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository_owner }}/acme-api

jobs:
  # ============================================
  # Job 1: Build and Test
  # ============================================
  build:
    name: Build and Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET SDK
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'
          include-prerelease: true

      - name: Restore dependencies
        run: dotnet restore src/Acme.sln

      - name: Build solution
        run: dotnet build src/Acme.sln --configuration Release --no-restore

      - name: Run tests
        run: dotnet test src/Acme.sln --configuration Release --no-build --verbosity normal --logger "trx;LogFileName=test_results.trx"

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: '**/test_results.trx'

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata for Docker
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: ./src
          file: ./src/Acme.AppHost/Dockerfile
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          platforms: linux/amd64

      - name: Output image tags
        run: echo "${{ steps.meta.outputs.tags }}"

  # ============================================
  # Job 2: Deploy to VPS
  # ============================================
  deploy:
    name: Deploy to VPS
    runs-on: ubuntu-latest
    needs: build
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master' || startsWith(github.ref, 'refs/tags/v'))
    
    environment:
      name: production
      url: https://${{ secrets.VPS_DOMAIN }}

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create .env file
        run: |
          cat > .env << EOF
          DOCKER_IMAGE=${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.ref_name == 'main' || github.ref_name == 'master' && 'latest' || github.ref_name }}
          DOMAIN=${{ secrets.VPS_DOMAIN }}
          DB_NAME=${{ secrets.DB_NAME }}
          SQL_SA_PASSWORD=${{ secrets.SQL_SA_PASSWORD }}
          DB_APPLY_MIGRATIONS=${{ secrets.DB_APPLY_MIGRATIONS }}
          DB_SEED_ROLES=${{ secrets.DB_SEED_ROLES }}
          DB_SEED_ADMIN=${{ secrets.DB_SEED_ADMIN }}
          JWT_SECRET_KEY=${{ secrets.JWT_SECRET_KEY }}
          JWT_ISSUER=${{ secrets.JWT_ISSUER }}
          JWT_AUDIENCE=${{ secrets.JWT_AUDIENCE }}
          JWT_ACCESS_TOKEN_MINUTES=${{ secrets.JWT_ACCESS_TOKEN_MINUTES }}
          JWT_REFRESH_TOKEN_DAYS=${{ secrets.JWT_REFRESH_TOKEN_DAYS }}
          ADMIN_EMAIL=${{ secrets.ADMIN_EMAIL }}
          ADMIN_PASSWORD=${{ secrets.ADMIN_PASSWORD }}
          CORS_ORIGIN_1=${{ secrets.CORS_ORIGIN_1 }}
          CORS_ORIGIN_2=${{ secrets.CORS_ORIGIN_2 }}
          LOG_LEVEL=${{ secrets.LOG_LEVEL }}
          APP_VERSION=${{ github.ref_name }}
          EOF

      - name: Copy files to VPS
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          source: "docker-compose.production.yml,Caddyfile,.env"
          target: "/opt/acme"
          strip_components: 0

      - name: Deploy to VPS via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VPS_HOST }}
          username: ${{ secrets.VPS_USERNAME }}
          key: ${{ secrets.VPS_SSH_KEY }}
          port: ${{ secrets.VPS_PORT || 22 }}
          script: |
            set -e
            cd /opt/acme-lab
            
            # Log in to GitHub Container Registry
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            # Pull latest images
            docker-compose -f docker-compose.production.yml pull
            
            # Backup database before deployment (if exists)
            if docker ps -q -f name=acme-sqlserver-prod > /dev/null 2>&1; then
              echo "Creating database backup..."
              docker exec acme-sqlserver-prod /opt/mssql-tools18/bin/sqlcmd \
                -S localhost -U sa -P "${{ secrets.SQL_SA_PASSWORD }}" -C \
                -Q "BACKUP DATABASE [${DB_NAME:-MyCompanyDbDb}] TO DISK='/var/opt/mssql/backups/backup_$(date +%Y%m%d_%H%M%S).bak' WITH INIT" || true
            fi
            
            # Stop old containers (keep database running)
            docker-compose -f docker-compose.production.yml stop api caddy
            
            # Remove old containers (keep database)
            docker-compose -f docker-compose.production.yml rm -f api caddy
            
            # Start all services
            docker-compose -f docker-compose.production.yml up -d
            
            # Wait for health checks
            echo "Waiting for services to be healthy..."
            sleep 10
            
            # Check API health
            for i in {1..30}; do
              if docker exec acme-api-prod curl -f http://localhost:8080/health > /dev/null 2>&1; then
                echo "API is healthy!"
                break
              fi
              echo "Waiting for API to be healthy... ($i/30)"
              sleep 2
            done
            
            # Clean up old images
            docker image prune -af --filter "until=168h"
            
            # Show running containers
            docker-compose -f docker-compose.production.yml ps
            
            echo "Deployment completed successfully!"

      - name: Notify deployment status
        if: always()
        run: |
          if [ "${{ job.status }}" == "success" ]; then
            echo "✅ Deployment to VPS completed successfully!"
          else
            echo "❌ Deployment to VPS failed!"
          fi
