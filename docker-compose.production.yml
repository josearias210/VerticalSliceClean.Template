version: "3.9"

# =============================================================================
# Docker Compose - Producción
# =============================================================================
# Servicios: API + SQL Server + Caddy (Reverse Proxy)
# 
# Despliegue:
#   docker compose -f docker-compose.production.yml up -d
#
# Ver logs:
#   docker compose -f docker-compose.production.yml logs -f
# =============================================================================

services:
  # ============================================
  # SQL Server
  # ============================================
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: acme-sqlserver-prod
    restart: unless-stopped
    ports:
      - "1433:1433"
    environment:
      ACCEPT_EULA: "Y"
      SA_PASSWORD: ${SQL_SA_PASSWORD}
      MSSQL_PID: "Express"  # Free edition for production
      MSSQL_COLLATION: "SQL_Latin1_General_CP1_CI_AS"
    volumes:
      - sqlserver_data:/var/opt/mssql
      - sqlserver_backups:/var/opt/mssql/backups
    networks:
      - acme-network
    deploy:
      resources:
        limits:
          cpus: '2.0'
          memory: 2G
        reservations:
          cpus: '0.5'
          memory: 512M
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ============================================
  # API
  # ============================================
  api:
    image: ${DOCKER_IMAGE:-ghcr.io/josearias210/acme-api:latest}
    container_name: acme-api-prod
    restart: unless-stopped
    ports:
      - "8080:8080"   # HTTP (Internal, exposed for debugging if needed, usually via Caddy)
    environment:
      # ASP.NET Core
      ASPNETCORE_ENVIRONMENT: "Production"
      ASPNETCORE_URLS: "http://+:8080"
      
      # Database
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=${DB_NAME:-AcmeDb};User Id=sa;Password=${SQL_SA_PASSWORD};TrustServerCertificate=True;MultipleActiveResultSets=true"
      
      # JWT Settings
      JwtSettings__Key: ${JWT_SECRET_KEY}
      JwtSettings__Issuer: ${JWT_ISSUER:-Acme}
      JwtSettings__Audience: ${JWT_AUDIENCE:-Acme.Api}
      JwtSettings__AccessTokenMinutes: ${JWT_ACCESS_TOKEN_MINUTES:-15}
      JwtSettings__RefreshTokenDays: ${JWT_REFRESH_TOKEN_DAYS:-7}
      
      # Admin User (initial setup)
      Admin__Email: ${ADMIN_EMAIL}
      Admin__Password: ${ADMIN_PASSWORD}
      
      # Database initialization
      Database__ApplyMigrationsOnStartup: ${DB_APPLY_MIGRATIONS:-false}
      Database__SeedRolesOnStartup: ${DB_SEED_ROLES:-true}
      Database__SeedAdminOnStartup: ${DB_SEED_ADMIN:-false}
      
      # CORS
      Cors__AllowedOrigins__0: ${CORS_ORIGIN_1:-https://yourdomain.com}
      Cors__AllowedOrigins__1: ${CORS_ORIGIN_2:-https://www.yourdomain.com}
      
      # Logging (minimal for production)
      Logging__MinimumLevel: ${LOG_LEVEL:-Information}
      Logging__Seq__ServerUrl: ${SEQ_URL:-}
      Logging__Seq__ApiKey: ${SEQ_API_KEY:-}
      
      # OpenTelemetry (disabled by default in production)
      OpenTelemetry__OtlpEndpoint: ${OTEL_ENDPOINT:-}
      OpenTelemetry__ServiceName: "Acme.Api"
      OpenTelemetry__ServiceVersion: ${APP_VERSION:-0.1.0}
    
    volumes:
      - api_logs:/app/logs
    
    networks:
      - acme-network
    
    depends_on:
      sqlserver:
        condition: service_healthy
    
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 512M
        reservations:
          cpus: '0.25'
          memory: 128M
    
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # ============================================
  # Reverse Proxy (Caddy for auto HTTPS)
  # ============================================
  caddy:
    image: caddy:2-alpine
    container_name: acme-caddy-prod
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
      - "443:443/udp"  # HTTP/3
    environment:
      DOMAIN: ${DOMAIN:-localhost}
      API_HOST: api:8080
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks:
      - acme-network
    depends_on:
      api:
        condition: service_healthy
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
        reservations:
          cpus: '0.1'
          memory: 64M

# ============================================
# Networks
# ============================================
networks:
  acme-network:
    driver: bridge

# ============================================
# Volumes
# ============================================
volumes:
  sqlserver_data:
    driver: local
  sqlserver_backups:
    driver: local
  api_logs:
    driver: local
  caddy_data:
    driver: local
  caddy_config:
    driver: local
